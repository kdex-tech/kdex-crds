defaults:
  run:
    shell: bash

jobs:
  ci:
    name: Build, Test
    runs-on: ubuntu-latest
    steps:
    - name: Clone the code
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Run Linter
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.10.1

    - name: Run Unit Tests
      run: |
        go mod tidy
        make test

  installer:
    if: (github.repository == 'kdex-tech/kdex-crds') && startsWith(github.ref, 'refs/tags/') && (github.event_name != 'pull_request')
    needs: ci
    runs-on: ubuntu-latest
    steps:
    - name: Clone the code
      uses: actions/checkout@v6

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod

    - name: Generate CRD Installer
      run: |
        make build-installer

    - name: Upload CRD Installer
      uses: actions/upload-artifact@v6
      with:
        name: crd-installer
        path: dist/install.yaml

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/install.yaml
        generate_release_notes: true

name: CI

on:
  pull_request:
    paths:
    - "**"
    - "!docs/**"
  push:
    branches-ignore:
    - "dependabot/**"
    paths:
    - "**"
    - "!docs/**"
    tags:
    - "v*"

permissions:
  contents: write
  packages: write
